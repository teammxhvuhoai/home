<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopee Link Copy Tool</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: linear-gradient(180deg, #ff6a00, #ff8c42);
      min-height: 100vh;
      padding: 12px;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 500px;
      margin: auto;
      background: rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      font-size: 26px;
      margin-bottom: 8px;
      color: white;
    }

    .desc {
      text-align: center;
      font-size: 13px;
      opacity: 0.95;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
    }

    .toolbar button {
      flex: 1;
      border: none;
      background: white;
      color: #ff6a00;
      padding: 12px 10px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .toolbar button:active {
      transform: scale(0.96);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .copy-btn {
      border: none;
      background: white;
      border-radius: 18px;
      padding: 12px;
      cursor: pointer;
      transition: 0.2s;
      text-align: left;
      min-height: 88px;
      overflow: hidden;
      position: relative;
    }

    .copy-btn:active {
      transform: scale(0.96);
    }

    .copy-title {
      color: #ff6a00;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .copy-link {
      color: #555;
      font-size: 10px;
      word-break: break-all;
      line-height: 1.4;
      max-height: 42px;
      overflow: hidden;
    }

    .copied-tag {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #2ecc71;
      color: white;
      font-size: 10px;
      padding: 4px 6px;
      border-radius: 999px;
      display: none;
    }

    .copy-btn.copied .copied-tag {
      display: block;
    }

    .status {
      text-align: center;
      font-size: 14px;
      margin: 16px 0;
      font-weight: bold;
    }

    textarea {
      width: 100%;
      height: 130px;
      border: none;
      border-radius: 16px;
      padding: 12px;
      font-size: 13px;
      resize: none;
      margin-bottom: 12px;
      outline: none;
    }

    .footer {
      text-align: center;
      font-size: 11px;
      opacity: 0.8;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 Shopee Link Quick Copy</h1>
    <p class="desc">
      Nhấn button để copy link cực nhanh — phù hợp spam share / đăng bài / marketing.
    </p>

    <div class="toolbar">
      <button onclick="shuffleLinks()">🔀 Trộn Link</button>
      <button onclick="copyRandom()">🎲 Copy Random</button>
      <button onclick="generateButtons()">🔄 Reload Button</button>
    </div>

    <div class="grid" id="buttonGrid"></div>

    <div class="status" id="statusText">Sẵn sàng copy...</div>

    <textarea id="linkInput" placeholder="Dán danh sách link Shopee tại đây, mỗi dòng 1 link..."></textarea>

    <div class="toolbar">
      <button onclick="loadCustomLinks()">➕ Load Link Mới</button>
    </div>

    <div class="footer">
      HTML Tool - Copy Link Shopee Siêu Nhanh
    </div>
  </div>

  <script>
    let links = [
      {
        title: 'Deal Tai Nghe Bluetooth',
        url: 'https://shopee.vn/link-1'
      },
      {
        title: 'Flash Sale Mỹ Phẩm',
        url: 'https://shopee.vn/link-2'
      },
      {
        title: 'Voucher Thời Trang',
        url: 'https://shopee.vn/link-3'
      },
      {
        title: 'Deal Gia Dụng Hot',
        url: 'https://shopee.vn/link-4'
      },
      {
        title: 'Phụ Kiện Điện Thoại',
        url: 'https://shopee.vn/link-5'
      },
      {
        title: 'Giảm Giá Laptop',
        url: 'https://shopee.vn/link-6'
      }
    ];

    const buttonGrid = document.getElementById('buttonGrid');
    const statusText = document.getElementById('statusText');

    function generateButtons() {
      buttonGrid.innerHTML = '';

      links.forEach((item, index) => {
        const btn = document.createElement('button');
        btn.className = 'copy-btn';

        btn.innerHTML = `
          <div class="copied-tag">COPIED</div>
          <div class="copy-title">${item.title}</div>
          <div class="copy-link">${item.url}</div>
        `;

        btn.onclick = () => copyLink(item, btn, index + 1);

        buttonGrid.appendChild(btn);
      });
    }`;

        btn.onclick = () => copyLink(link, btn, index + 1);

        buttonGrid.appendChild(btn);
      });
    }

    function copyLink(item, button, number) {
      const fullText = `${item.title}
${item.url}`;

      navigator.clipboard.writeText(fullText)
        .then(() => {
          statusText.innerHTML = `✅ Đã copy: ${item.title}`;

          button.classList.add('copied');

          setTimeout(() => {
            button.classList.remove('copied');
          }, 1200);
        })
        .catch(() => {
          statusText.innerHTML = '❌ Copy thất bại';
        });
    }

    function shuffleLinks() {
      for (let i = links.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [links[i], links[j]] = [links[j], links[i]];
      }

      generateButtons();
      statusText.innerHTML = '🔀 Đã trộn danh sách link';
    }

    function copyRandom() {
      const randomIndex = Math.floor(Math.random() * links.length);
      const item = links[randomIndex];

      const fullText = `${item.title}
${item.url}`;

      navigator.clipboard.writeText(fullText)
        .then(() => {
          statusText.innerHTML = `🎲 Đã copy random: ${item.title}`;
        });
    }

    function loadCustomLinks() {
      const input = document.getElementById('linkInput').value.trim();

      if (!input) {
        alert('Vui lòng nhập dữ liệu');
        return;
      }

      const rows = input.split('
');

      links = rows.map((row, index) => {
        const parts = row.split('|');

        return {
          title: parts[0] || `Link ${index + 1}`,
          url: parts[1] || parts[0]
        };
      });

      generateButtons();

      statusText.innerHTML = `🚀 Đã load ${links.length} link mới`;
    }

    generateButtons();
  </script>
</body>
</html>
